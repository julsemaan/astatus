name: Publish to PyPI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [pyproject.toml]

jobs:
  detect-version-change:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect version change
        id: check
        run: |
          import tomllib, os, sys, subprocess
          from pathlib import Path

          def read_version(path):
              with open(path, "rb") as f:
                  return tomllib.load(f)["project"]["version"]

          def set_output(name, value):
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"{name}={value}\n")

          new_version = read_version("pyproject.toml")

          before = os.environ.get("BEFORE_SHA", "")
          if not before or before == "0" * 40:
              print("No previous commit; treating as version change.")
              set_output("version_changed", "true")
              sys.exit(0)

          try:
              run = subprocess.run(
                  ["git", "show", f"{before}:pyproject.toml"],
                  capture_output=True, check=True,
              )
              old_version = tomllib.loads(run.stdout.decode())["project"]["version"]
          except Exception as e:
              print(f"Could not read previous pyproject.toml ({e}); treating as version change.")
              set_output("version_changed", "true")
              sys.exit(0)

          changed = new_version != old_version
          print(f"old={old_version} new={new_version} changed={changed}")
          set_output("version_changed", str(changed).lower())
        env:
          BEFORE_SHA: ${{ github.event.before }}
        shell: python

  publish:
    runs-on: ubuntu-latest
    needs: detect-version-change
    if: >
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && needs.detect-version-change.outputs.version_changed == 'true')
      )
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/agent-status
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install build twine
          python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
